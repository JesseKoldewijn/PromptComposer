name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    name: Bump version on main
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      sha: ${{ steps.ver.outputs.sha }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # GITHUB_TOKEN push does not retrigger workflows; same run continues.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and commit
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          VERSION="0.1.${{ github.run_number }}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          node scripts/set-version.mjs "$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Version already ${VERSION}; reusing HEAD"
          else
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
            git commit -m "chore: release ${TAG}"
            git push origin HEAD:main
          fi

          SHA="$(git rev-parse HEAD)"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "Prepared release ${TAG} at ${SHA}"

  check:
    name: Lint & test
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '26.3.0'
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux webkit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint, unit, integration, API e2e
        run: yarn test:ci

  release:
    name: Build & publish
    needs: [prepare, check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --bundles deb,appimage
          - platform: windows-latest
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '26.3.0'
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.platform }}

      - name: Install Linux webkit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libfuse2

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # GitHub secret UI often wraps long base64 keys with newlines (ASCII 10),
      # which breaks Tauri's base64 decode. Our key is single-line base64.
      - name: Normalize updater signing key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          KEY="$(printf '%s' "$RAW_KEY" | tr -d '\n\r')"
          if [ -z "$KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is empty" >&2
            exit 1
          fi
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            echo "$KEY"
            echo "EOF"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
            printf '%s' "$RAW_PASSWORD" | tr -d '\n\r'
            echo
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build installers and attach to tagged GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Annotated tag pointing at the version-bump commit; shared across matrix jobs.
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: Prompt Composer ${{ needs.prepare.outputs.tag }}
          releaseBody: |
            Release for commit `${{ needs.prepare.outputs.sha }}` (`${{ needs.prepare.outputs.short_sha }}`).

            **Install / upgrade**
            - **Windows / AppImage:** the app checks GitHub Releases on startup and can install signed updates in-app.
            - **Windows (manual):** run the NSIS `-setup.exe` (product id `com.promptcomposer.desktop`).
            - **Linux `.deb`:** install/upgrade with your package manager (`sudo dpkg -i …`). In-app updates apply to AppImage/NSIS, not `.deb`.

            Version `${{ needs.prepare.outputs.version }}` increases on every successful `main` release so upgrades are recognized.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      # Stable names for ELL-Toolkit Vercel rewrites (releases/latest/download/…).
      - name: Upload stable toolkit download assets
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          VERSIONED="$(find src-tauri/target/release/bundle/nsis -name '*x64-setup.exe' -type f | head -n1)"
          if [ -z "$VERSIONED" ]; then
            echo "NSIS setup.exe not found under bundle/nsis" >&2
            ls -laR src-tauri/target/release/bundle || true
            exit 1
          fi
          cp "$VERSIONED" Prompt.Composer_x64-setup.exe
          printf '%s\n' "{\"version\":\"${VERSION}\",\"tag\":\"${TAG}\"}" > version.json
          gh release upload "$TAG" version.json Prompt.Composer_x64-setup.exe --clobber
          echo "Uploaded version.json and Prompt.Composer_x64-setup.exe to $TAG"
